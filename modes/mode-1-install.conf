# shellcheck shell=sh
# shellcheck disable=SC2034
# modes/mode-1-install.conf — declarative config for the mode-1-install mode.
# mode-1-install caches a plain-patched (universal + mode_1 fakelock) ABL into
# the GBLP1 overlay on EFISP and writes a known-vulnerable loader ABL onto the
# target slot. See the SP3 design spec
# docs/superpowers/specs/2026-05-17-zip-install-mode-design.md.

MODE_NAME="mode-1-install"
MODE_DESC="install gbl-chainload mode-1 (VerifiedBoot fakelock; cache ABL + loader-ABL restore)"
MODE_WRITES="efisp abl"
MODE_TOOLS="fv-unwrap abl-patcher gbl-pack gbl-commit"
MODE_EFI="mode-1.efi"
MODE_LIB="install-common.sh"   # shared modes/ lib this mode sources
