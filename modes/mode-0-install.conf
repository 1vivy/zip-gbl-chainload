# shellcheck shell=sh
# shellcheck disable=SC2034
# modes/mode-0-install.conf — declarative config for the mode-0-install mode.
# mode-0-install caches a universal-patched (honest) ABL into the GBLP1 overlay
# on EFISP and writes a known-vulnerable loader ABL onto the target slot. No
# fakelock, no spoof. See the mode-2-zip design spec.

MODE_NAME="mode-0-install"
MODE_DESC="install gbl-chainload mode-0 (honest-observation: universal-patched cached ABL, no fakelock/spoof)"
MODE_WRITES="efisp abl"
MODE_TOOLS="fv-unwrap abl-patcher gbl-pack gbl-commit"
MODE_EFI="mode-0.efi"
