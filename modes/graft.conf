# shellcheck shell=sh
# shellcheck disable=SC2034
# modes/graft.conf — declarative config for the graft mode.
# graft writes stock vbmeta onto a custom partition image so it survives
# mode-1 userspace AVB. See the SP4 design spec.

MODE_NAME="graft"
MODE_DESC="graft stock vbmeta onto namespaced custom recovery image (mode-1 AVB coexistence)"
MODE_WRITES="the selected slot's recovery partition"
MODE_TOOLS="vbmeta-graft gbl-commit"
MODE_EFI=""
MODE_LIB="graft-common.sh"
