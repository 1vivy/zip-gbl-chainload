# shellcheck shell=sh
# shellcheck disable=SC2034
# modes/profile.conf — declarative config for the profile mode.
# profile installs gbl-chainload mode-2: an OEM-patched cached ABL plus a
# 120-byte mode2_profile derived on-device from a stock vbmeta, packed into
# the GBLP1 overlay on EFISP, with a vulnerable loader ABL on the target
# slot. See the mode-2 ZIP design spec.

MODE_NAME="profile"
MODE_DESC="install gbl-chainload mode-2 (OEM-patched cached ABL + profile)"
MODE_WRITES="efisp abl"
MODE_TOOLS="fv-unwrap abl-patcher gbl-pack gbl-commit mode2-profile"
MODE_EFI="mode-2.efi"
