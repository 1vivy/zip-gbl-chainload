# shellcheck shell=sh
# shellcheck disable=SC2034
# modes/mode-2-install.conf — declarative config for the mode-2-install mode.
# mode-2-install installs gbl-chainload mode-2: an OEM-patched cached ABL plus a
# 120-byte mode2_profile derived on-device from a stock vbmeta, packed into the
# GBLP1 overlay on EFISP, with a vulnerable loader ABL on the target slot. See
# the mode-2-zip design spec.

MODE_NAME="mode-2-install"
MODE_DESC="install gbl-chainload mode-2 (OEM-patched cached ABL + mode2_profile)"
MODE_WRITES="efisp abl"
MODE_TOOLS="fv-unwrap abl-patcher gbl-pack gbl-commit mode2-profile"
MODE_EFI="mode-2.efi"
MODE_LIB="install-common.sh"   # shared modes/ lib this mode sources
